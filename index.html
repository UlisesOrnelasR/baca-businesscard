<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    min-height: 100%;
    background: #000;
    font-family: 'Inter', -apple-system, sans-serif;
    overflow-x: hidden;
    color: #fff;
  }
  body {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px 16px;
    background:
      radial-gradient(ellipse at 50% 30%, rgba(30, 80, 200, 0.18) 0%, transparent 60%),
      #000;
  }

  .card-wrapper {
    width: 100%;
    max-width: 440px;
    margin-bottom: 20px;
  }
  .card-stage {
    position: relative;
    width: 100%;
    aspect-ratio: 1.75 / 1;
    cursor: pointer;
  }

  /* Crossfade + rotate so the back never mirrors */
  .face {
    position: absolute;
    inset: 0;
    border-radius: 16px;
    overflow: hidden;
    background: radial-gradient(ellipse at 50% 55%, #1e4394 0%, #0f2964 50%, #071a48 100%);
    box-shadow:
      0 0 0 1px rgba(80, 140, 255, 0.25),
      0 20px 60px rgba(30, 80, 200, 0.35),
      0 8px 20px rgba(0,0,0,0.5);
    transition: opacity 0.45s ease, transform 0.55s cubic-bezier(0.4, 0.0, 0.2, 1);
  }
  .front { opacity: 1; transform: rotateY(0deg); }
  .back  { opacity: 0; transform: rotateY(-90deg); pointer-events: none; }
  .card-stage.flipped .front { opacity: 0; transform: rotateY(90deg); pointer-events: none; }
  .card-stage.flipped .back  { opacity: 1; transform: rotateY(0deg); pointer-events: auto; }

  /* FRONT */
  .front {
    padding: 18px 20px;
    display: flex;
    flex-direction: column;
  }
  .brand {
    font-family: 'Oswald', sans-serif;
    font-weight: 700;
    font-size: clamp(22px, 6.2vw, 30px);
    letter-spacing: 0.5px;
    line-height: 1;
    background: linear-gradient(90deg, #4a7dff 0%, #7aa8ff 50%, #a8c5ff 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    white-space: nowrap;
  }
  .front-main {
    display: flex;
    flex: 1;
    align-items: center;
    gap: 12px;
    margin-top: 6px;
  }
  .front-info { flex: 1; min-width: 0; }
  .tagline {
    font-size: 10px;
    letter-spacing: 2.5px;
    color: rgba(255,255,255,0.55);
    text-transform: uppercase;
    margin-bottom: 14px;
    font-weight: 500;
  }
  .owner-name {
    font-family: 'Oswald', sans-serif;
    font-weight: 600;
    font-size: clamp(16px, 4.8vw, 22px);
    letter-spacing: 1px;
    color: #fff;
    line-height: 1;
    margin-bottom: 4px;
  }
  .owner-title {
    font-size: 9px;
    letter-spacing: 2px;
    color: rgba(255,255,255,0.45);
    text-transform: uppercase;
    margin-bottom: 14px;
  }
  .contact-row {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11.5px;
    color: rgba(255,255,255,0.8);
    margin-bottom: 5px;
  }
  .contact-row svg { flex-shrink: 0; width: 13px; height: 13px; opacity: 0.7; }

  .car-art {
    width: 52%;
    max-width: 210px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }
  .car-art::before {
    content: "";
    position: absolute;
    inset: -10% -5%;
    background: radial-gradient(ellipse at center, rgba(122, 168, 255, 0.35) 0%, rgba(74, 125, 255, 0.12) 40%, transparent 70%);
    filter: blur(8px);
    z-index: 0;
  }
  .car-art img {
    position: relative;
    z-index: 1;
    width: 100%;
    opacity: 0.6;
    height: auto;
    mix-blend-mode: screen;
    filter: brightness(1.15) contrast(1.1) drop-shadow(0 4px 14px rgba(0,0,0,0.4));
    -webkit-mask-image: radial-gradient(ellipse at center, black 55%, transparent 90%);
    mask-image: radial-gradient(ellipse at center, black 55%, transparent 90%);
  }

  /* BACK */
  .back {
    padding: 24px 22px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    gap: 14px;
  }
  .come-to-you {
    font-family: 'Oswald', sans-serif;
    font-weight: 700;
    font-size: clamp(24px, 6.5vw, 30px);
    letter-spacing: 1px;
    background: linear-gradient(90deg, #7aa8ff 0%, #ffffff 50%, #7aa8ff 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    text-transform: uppercase;
    line-height: 1.05;
  }
  .back-prompt {
    font-size: 12px;
    color: rgba(255,255,255,0.75);
    letter-spacing: 0.5px;
    line-height: 1.5;
    max-width: 280px;
  }
  .promo-badge {
    background: linear-gradient(135deg, rgba(74, 125, 255, 0.22), rgba(122, 168, 255, 0.1));
    border: 1px solid rgba(122, 168, 255, 0.45);
    border-radius: 10px;
    padding: 10px 18px;
  }
  .promo-label {
    font-size: 9px;
    letter-spacing: 2px;
    color: rgba(122, 168, 255, 0.95);
    text-transform: uppercase;
    font-weight: 600;
    margin-bottom: 3px;
  }
  .promo-text {
    font-family: 'Oswald', sans-serif;
    font-weight: 600;
    font-size: clamp(13px, 3.6vw, 16px);
    color: #fff;
    letter-spacing: 0.5px;
  }
  .promo-amount { color: #7aa8ff; font-size: 1.15em; }

  .flip-hint {
    text-align: center;
    color: rgba(122, 168, 255, 0.6);
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .flip-hint svg {
    width: 12px; height: 12px;
    animation: spin 3s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .actions {
    width: 100%;
    max-width: 440px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .actions .full { grid-column: 1 / -1; max-width: 220px; margin: 0 auto; width: 100%; }
  .btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 14px 16px;
    border-radius: 12px;
    font-family: 'Inter', sans-serif;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    text-decoration: none;
    transition: transform 0.15s;
  }
  .btn:active { transform: scale(0.97); }
  .btn svg { width: 16px; height: 16px; }

  .btn-primary {
    background: linear-gradient(135deg, #2a5fdb, #4a7dff);
    color: #fff;
    box-shadow: 0 6px 20px rgba(42, 95, 219, 0.4);
  }
  .btn-outline {
    background: transparent;
    color: #7aa8ff;
    border: 1.5px solid rgba(122, 168, 255, 0.4);
  }
  .btn-outline:active { background: rgba(122, 168, 255, 0.1); }

  .view-services {
    margin-top: 18px;
    text-align: center;
  }
  .view-services a {
    color: rgba(255,255,255,0.5);
    font-size: 12px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    text-decoration: none;
    border-bottom: 1px solid rgba(255,255,255,0.2);
    padding-bottom: 2px;
  }
</style>
</head>
